{% extends "base.html" %}
{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div class="glass-card" style="width: 100%; max-width: 500px;">
        <h2 style="margin-bottom: 10px; color: #fff;">Share Your Experience</h2>
        <p style="color: var(--text-muted); margin-bottom: 30px; font-size: 0.9rem;">How was <strong>{{ event.name }}</strong>?</p>
        
        <form method="POST">
            <div class="form-group">
                <label>Your Feedback</label>
                <textarea name="content" class="form-control" rows="5" placeholder="Tell us what you loved about this event..." required></textarea>
            </div>
            
            <div style="display: flex; gap: 15px; margin-top: 20px;">
                <a href="{{ url_for('index') }}" class="btn btn-outline" style="flex: 1; text-align: center;">Cancel</a>
                <button type="submit" class="btn" style="flex: 1;">Submit Feedback</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
